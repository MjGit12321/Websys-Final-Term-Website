<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .navbar {
            width: 100%;
            background: #003459;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            box-sizing: border-box;

            position: fixed;
            top: 0;
            z-index: 1000;
        }
        .navbar .brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .navbar .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
        }
        .navbar .profile .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .navbar .profile .avatar img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            object-fit: cover;
        }
        body {
            margin: 0;
            padding: 80px 0 20px 0;
            font-family: 'Lora', serif;
            
        }
        .sidebar {
            width: 140px;
            
            color: #ffffff;
            display: flex;
            flex-direction: column;
        
            box-sizing: border-box;
            position: absolute;
            left: 0px;
            gap: 40px;
            z-index: 1000;
        
            position: fixed;
            top: 120px;

            transition: all 0.3s ease;
        }

        .sidebar button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #F3F3F3;
            border: 2px solid #00A8E8;
            border-radius: 0px 10px 10px 0px;
            font-weight: 600;
            padding: 20px 16px;
            cursor: pointer;
            gap: 10px;

            transition: 0.3s all;
        }

        .sidebar button:hover{
            border: 2px solid black !important;
            background-color: #dadada !important;
        }
        .sidebar button img {
            max-height: 24px;
            width: auto;
            display: inline-block;
        }
        .center{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main-frame {
            min-height: 88.8vh;
            position: relative;
        }
        .main-content {
            width: 90%;
            min-height: 100%;
            background: #F3F3F3;
            margin: 0 auto;
            padding: 24px;
            border-radius: 10px;
            box-sizing: border-box;
        }
        #sidebar.minimized {
            width: 60px;
            overflow: hidden;
        }
        #sidebar.minimized button span{
            display: none;
        }
        .sort{
            padding: 3px;
            border: 1px solid #00A8E8;
            border-radius: 5px;
        }
        .top-group{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #search-input{
            padding: 5px;
            width: 200px;
            border: 1px solid #00A8E8;
            border-radius: 5px;
        }
        #search-box{
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .product-grid-container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        .product-card{
            background: #ffffff;
            border: 1px solid #00A8E8;
            border-radius: 10px;
            padding: 16px;
            box-sizing: border-box;
            height: 250px;
        }
        .bottom-group{
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .bottom-group div{
            padding: 8px 12px;
            border: 1px solid #00A8E8;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;

            transition: 0.3s all;
        }
        .bottom-group div:hover{
            background-color: #00A8E8;
            color: #F3F3F3;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Simple E-commerce System</div>
        <div class="profile">
            <div class="avatar"> <img src="Icons/Person Icon.png" alt="" srcset=""></div>
            <div>MJ Jade G. Piquero</div>
        </div>
    </nav>
    <aside id="sidebar" class="sidebar minimized">
        <button id="Minmax_button" onclick="minmax_icon()"><img src="Icons/menu.png" alt="" srcset=""><span>Minimize</span></button> 
        <button onclick="location.href='Dashboard.html'"><img src="Icons/Black DB.png" alt="" srcset=""><span>Dashboard</span></button> 
        <button onclick="location.href='Products.html'" class="sidebar-selected"><img src="Icons/White Products.png" alt="" srcset=""><span>Products</span></button> 
        <button onclick="location.href='Carts.html'"><img src="Icons/Cart Icon.png" alt="" srcset=""><span>Carts</span></button> 
        <button onclick="location.href='Orders.html'"><img src="Icons/Orders Icon.png" alt="" srcset=""><span>Orders</span></button> 
        <button onclick="location.href='Home Page.html'"><img src="Icons/Logout Icon.png" alt="" srcset=""><span>Logout</span></button> 
    </aside>
    <div id="main-frame">
        <div class="main-content">
            <div class="top-group">
                <div class="sort-group">
                    <label for="sort">Sort by:</label>
                    <select id="sort-name" class="sort" name="sort">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                    </select>
                    <select id="sort-price" class="sort" name="sort">
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                    <select id="sort-date" class="sort" name="sort">
                        <option value="date-asc">Date (New to Old)</option>
                        <option value="date-desc">Date (Old to New)</option>
                    </select>
                </div>
                <div id="search-box">
                    <img src="Icons/search.png" alt="" srcset="">
                    <input type="text" id="search-input" placeholder="Search products...">
                </div>
            </div>
            <br><hr>
            <div class="product-grid-container">
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
                <div class="product-card">1</div>
            </div>
            <br><hr>
            <div class="bottom-group">
                <div><</div>
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>></div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
