<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .navbar {
            width: 100%;
            background: #003459;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            box-sizing: border-box;
        }
        .navbar .brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .navbar .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
        }
        .navbar .profile .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .navbar .profile .avatar img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            object-fit: cover;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lora', serif;
            
        }

        .sidebar {
            position: absolute;
            width: 140px;
            margin-top: 60px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
        
            box-sizing: border-box;
            position: absolute;
            left: 0px;
            gap: 40px;
            z-index: 1000;
        }

        .sidebar button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #F3F3F3;
            border: 1px solid #00A8E8;
            border-radius: 0px 10px 10px 0px;
            font-weight: 600;
            padding: 20px 16px;
            cursor: pointer;
            gap: 10px;
        }
        .sidebar button img {
            max-height: 24px;
            width: auto;
            display: inline-block;
        }
        .center{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main-frame {
            height: 88.8vh;
            position: relative;
        }
        .main-content {
            width: 90%;
            min-height: 90%;
            background: #F3F3F3;
            margin: 0 auto;
            padding: 24px;
            border-radius: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">Simple E-commerce System</div>
        <div class="profile">
            <div class="avatar"> <img src="Icons/Person Icon.png" alt="" srcset=""></div>
            <div>MJ Jade G. Piquero</div>
        </div>
    </nav>
    <aside class="sidebar">
        <button><img src="Icons/menu.png" alt="" srcset="">Minimize</button> 
        <button class="sidebar-selected"><img src="Icons/Dashboard Icon.png" alt="" srcset="">Dashboard</button> 
        <button><img src="Icons/Product Icon.png" alt="" srcset="">Products</button> 
        <button><img src="Icons/Cart Icon.png" alt="" srcset="">Carts</button> 
        <button><img src="Icons/Orders Icon.png" alt="" srcset="">Orders</button> 
        <button><img src="Icons/Logout Icon.png" alt="" srcset="">Log out</button> 
    </aside>
    <div id="main-frame" class="center">
        <div class="main-content">

        </div>
    </div>
</body>
</html>
